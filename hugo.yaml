# Hugo configuration file
title: JasperVdB | Additive Manufacturing

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Home
      pageRef: /
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Diensten
      identifier: diensten
      weight: 3
    - name: Particulier
      pageRef: /diensten/particulier
      parent: diensten
      weight: 1
    - name: B2B
      pageRef: /diensten/b2b
      parent: diensten
      weight: 2
    - name: Contact
      pageRef: /contact
      weight: 4
    - name: FAQ
      pageRef: /faq
      weight: 5
    - name: Materialen
      weight: 6
      url: "https://tm3dfilament.nl/collections/all-filament"

params:
  navbar:
    displayTitle: true
    displayLogo: true
  footer:
    displayCopyright: true
    displayPoweredBy: false
  editURL:
    enable: false
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
  page:
    width: full
