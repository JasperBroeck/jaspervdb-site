# Hugo configuration file
title: My Site

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Home
      pageRef: /
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Diensten
      url: /diensten
      weight: 3
    - name: Contact
      pageRef: /contact
      weight: 4
    - name: Materialen
      weight: 5
      url: "https://tm3dfilament.nl"

params:
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    displayCopyright: true
    displayPoweredBy: false
    copyright: "© 2026 JasperVdB | Additive Manufacturing. Alle rechten voorbehouden."
  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
  page:
    width: full
